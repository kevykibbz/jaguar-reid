version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: jaguar-reid-backend
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend/models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jaguar-network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: jaguar-reid-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jaguar-network

networks:
  jaguar-network:
    driver: bridge

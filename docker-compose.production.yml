# Production Docker Compose Configuration
# This file shows how to deploy to production

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: jaguar-reid-backend
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend/models:/app/models:ro  # Read-only model files
    environment:
      - PYTHONUNBUFFERED=1
      # Production environment variables
      - ENV=production
      - LOG_LEVEL=info
      # Database Configuration
      - DATABASE_TYPE=postgresql
      # Azure Storage (required for image storage)
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER:-jaguar-images}
      # Azure PostgreSQL Database (required for production)
      - DATABASE_URL=${DATABASE_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # 10 minutes for first-time model downloads (ConvNeXt backbone ~330MB)
    networks:
      - jaguar-network
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: jaguar-reid-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # Backend URL for nginx proxy
      # Local: http://backend:8000
      # Production: Use Azure Container Apps URL or set via .env
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - jaguar-network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  jaguar-network:
    driver: bridge

# ============================================================================
# PRODUCTION DEPLOYMENT INSTRUCTIONS
# ============================================================================
#
# Prerequisites:
# 1. Azure Storage Account created with container "jaguar-images"
# 2. Azure PostgreSQL Database created and initialized
# 3. Model files in ./src/backend/models/:
#    - convnext_arcface_jaguar_final.pth
#    - species_classifier_efficientnet.pth
#    - sam_vit_b_01ec64.pth
#    - yolov8n.pt
#
# Step 1: Create .env file with Azure credentials
# -----------------------------------------------
# Create a file named .env in the project root with:
#
# AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=your_account;AccountKey=your_key;EndpointSuffix=core.windows.net
# AZURE_STORAGE_CONTAINER=jaguar-images
# DATABASE_URL=postgresql://username:password@yourserver.postgres.database.azure.com:5432/jaguar_reid
# FRONTEND_PORT=80
#
# Step 2: Build and start services (with BuildKit caching)
# ----------------------------------------------------------
# Enable BuildKit for faster builds with cache:
# $env:DOCKER_BUILDKIT=1  # PowerShell
# export DOCKER_BUILDKIT=1  # Linux/Mac
#
# Build (first time or when dependencies change):
# docker compose -f docker-compose.production.yml build
#
# Start services:
# docker compose -f docker-compose.production.yml up -d
#
# Or build and start in one command:
# docker compose -f docker-compose.production.yml up -d --build
#
# Step 3: Verify deployment
# --------------------------
# # Check backend health
# curl http://localhost:8000/health
#
# # Check logs
# docker compose -f docker-compose.production.yml logs -f backend
# docker compose -f docker-compose.production.yml logs -f frontend
#
# Step 4: Monitor services
# -------------------------
# docker compose -f docker-compose.production.yml ps
#
# Step 5: Stop services
# ----------------------
# docker compose -f docker-compose.production.yml down
#
# Step 6: For Azure Container Apps deployment
# --------------------------------------------
# See AZURE_DEPLOYMENT.md for Azure Container Apps deployment guide
#
# Note: For HTTPS in production, deploy to Azure Container Apps
# or add a reverse proxy like Nginx or Traefik in front
